name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Lint & Type-check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w apps/api
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x

      - name: Type-check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Type-check Dashboard
        run: npx tsc --noEmit -p apps/dashboard/tsconfig.json

  # ── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w apps/api
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x

      - name: Run tests
        run: npm test -w apps/api

  # ── Build check ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build schema package
        run: npm run build -w packages/schema

      - name: Build API
        run: npm run build -w apps/api
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x

      - name: Build Dashboard
        run: npm run build -w apps/dashboard
